<div class="modal fade" id="updateOrderNoteModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    @if(isEditMode){
                    <i class="bi bi-chat-left-text me-2"></i>Edit Note
                    }
                    @else{
                    <i class="bi bi-chat-left-text me-2"></i>Add Note
                    }
                </h5>
                <button id="customerModalCloseBtn" type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="modalForm" (ngSubmit)="submitForm()">
                    <div class="mb-3">
                        <input type="text" class="form-control" formControlName="note"
                            [ngClass]="{ 'is-invalid': note?.invalid && note?.touched }">
                        <div class="invalid-feedback" *ngIf="note?.touched && note?.invalid">
                            Name is required
                        </div>
                    </div>

                    <div><button id="customerModalFormSubmitButton" type="submit" class="d-none"
                            [disabled]="isSubmitting"></button></div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" [disabled]="isSubmitting"
                    (click)="programmaticallyClickFormSubmitButton()">
                    @if(!isSubmitting){
                    @if(isEditMode){
                    <span>Save</span>
                    }
                    @else {
                    <span>Add</span>
                    }
                    }
                    @else {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    @if(isEditMode){
                    <span>Saving...</span>
                    }
                    @else {
                    <span>Adding...</span>
                    }
                    }
                </button>
            </div>
        </div>
    </div>
</div>
