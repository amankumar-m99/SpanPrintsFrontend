<div class="preview-container" *ngIf="!loading; else loadingTpl">

    <img *ngIf="previewType === 'image'" class="thumbnail" [src]="safeUrl" alt="preview" />

    <!-- <iframe *ngIf="previewType === 'pdf'" [src]="safeUrl" width="100%" height="120px"></iframe> -->
    <iframe class="thumbnail" *ngIf="previewType === 'pdf'" [src]="safeUrl"></iframe>

    <video *ngIf="previewType === 'video'" [src]="safeUrl" controls width="100%"></video>

    <audio *ngIf="previewType === 'audio'" [src]="safeUrl" controls></audio>

    <pre *ngIf="previewType === 'text'">{{ textContent }}</pre>

    <div *ngIf="previewType === 'office'" class="thumbnail border p-1">
        <small>This file can't be previewed directly. Download instead</small>
    </div>

    <div *ngIf="previewType === 'unsupported'" class="thumbnail border p-1">
        <small>No preview available for this file type. Download instead</small>
    </div>

</div>
<ng-template #loadingTpl>Loading preview...</ng-template>
