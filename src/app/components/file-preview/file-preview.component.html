<div class="preview-container" *ngIf="!loading; else loadingTpl">

    <img *ngIf="previewType === 'image'" class="thumbnail" [src]="safeUrl" alt="preview" />

    <iframe *ngIf="previewType === 'pdf'" [src]="safeUrl" width="100%" height="600px"></iframe>

    <video *ngIf="previewType === 'video'" [src]="safeUrl" controls width="100%"></video>

    <audio *ngIf="previewType === 'audio'" [src]="safeUrl" controls></audio>

    <pre *ngIf="previewType === 'text'">{{ textContent }}</pre>

    <div *ngIf="previewType === 'office'">
        Office documents can't be previewed directly in-browser.
        <button (click)="download()">Download instead</button>
        <!-- or embed via Office/Google viewer, see note below -->
    </div>

    <div *ngIf="previewType === 'unsupported'">
        No preview available for this file type.
        <button (click)="download()">Download instead</button>
    </div>

</div>
<ng-template #loadingTpl>Loading preview...</ng-template>
