<div class="modal fade" id="uploadOrderAttachmentModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-chat-left-text me-2"></i>Upload Files
                </h5>
                <button id="uploadOrderAttachmentModalCloseBtn" type="button" class="btn-close"
                    data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="modalForm" (ngSubmit)="submitForm()">
                    <div class="mb-3">
                        <label class="form-label">Attachments</label>
                        <input type="file" class="form-control" (change)="onFileSelected($event)" multiple
                            accept="image/*,.pdf,.doc,.docx,.zip" />

                        <!-- Show selected files -->
                        <div *ngIf="selectedFiles.length" class="mt-2 small text-muted">
                            {{ selectedFiles.length }} file(s) selected.
                        </div>
                        <ul *ngIf="selectedFiles.length" class="list-group mt-2">
                            <li *ngFor="let file of selectedFiles; let i = index"
                                class="list-group-item d-flex justify-content-between align-items-center">
                                <div class="text-truncate" style="max-width: 80%;">
                                    <i class="bi bi-paperclip me-2 text-secondary"></i>
                                    {{ file.name }}
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeFile(i)"
                                    title="Remove file">
                                    <i class="bi bi-x"></i>
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div><button id="uploadOrderAttachmentModalFormSubmitButton" type="submit" class="d-none"
                            [disabled]="isSubmitting"></button></div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" [disabled]="isSubmitting"
                    (click)="programmaticallyClickFormSubmitButton()">
                    @if(!isSubmitting){
                    <span>Add</span>
                    }
                    @else {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    <span>Adding...</span>
                    }
                </button>
            </div>
        </div>
    </div>
</div>
