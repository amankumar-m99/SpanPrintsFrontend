<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
        <!-- Logo Section (Fixed) -->
        <div class="sidebar-header border-bottom d-flex flex-column"
            [ngClass]="sidebarCollapsed ? 'align-items-start' : 'align-items-end'">
            <a class="navbar-brand d-flex align-items-center" routerLink="/">
                <img src="logo/logo_bg_no.png" width="40" height="40">
                <img src="logo/text_bg_no.png" height="30" [class.d-none]="sidebarCollapsed">
            </a>
            <button class="btn btn-sm btn-outline-light mt-2 d-none d-lg-inline" (click)="toggleSidebar()">
                <i class="bi" [ngClass]="sidebarCollapsed ? 'bi-list' : 'bi-arrow-left-square'"></i>
            </button>
        </div>
        <!-- Scrollable Menu -->
        <nav class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a routerLink="orders" class="nav-link text-white">
                        <i class="bi bi-bag-heart-fill me-2 text-success"></i>
                        <span class="menu-text">Orders</span>
                    </a>
                </li>
                <li class="nav-item d-none">
                    <a class="nav-link text-white d-flex align-items-center" data-bs-toggle="collapse" role="button"
                        href="#ordersSubmenu" aria-expanded="false" aria-controls="ordersSubmenu">
                        <i class="bi bi-bag-heart-fill me-2 text-success"></i>
                        <span class="menu-text">Orders</span>
                        <i class="bi bi-caret-down-fill ms-auto"></i>
                    </a>
                    <div class="collapse ms-4" id="ordersSubmenu">
                        <ul class="nav flex-column">
                            <li>
                                <a routerLink="add-order" class="nav-link text-white" (click)="closeSidebarOnMobile()">
                                    <i class="bi bi-bag-plus me-2 text-success"></i>
                                    <span class="menu-text">Place Order</span>
                                </a>
                            </li>
                            <li>
                                <a routerLink="orders" class="nav-link text-white" (click)="closeSidebarOnMobile()">
                                    <i class="bi bi-bag-fill me-2 text-success"></i>
                                    <span class="menu-text">All Orders</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>
                <li class="nav-item">
                    <a routerLink="customers" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-people-fill me-2 text-primary"></i>
                        <span class="menu-text">Customers</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="vendors" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-truck me-2 text-warning"></i>
                        <span class="menu-text">Vendors</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="inventory" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-boxes me-2 text-info"></i>
                        <span class="menu-text">Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="expenses" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-currency-rupee me-2 text-danger"></i>
                        <span class="menu-text">Expenses</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="ledger" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-piggy-bank me-2 text-success"></i>
                        <span class="menu-text">Ledger</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="statistics" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-graph-up-arrow text-primary me-2"></i>
                        <span class="menu-text">Statistics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="quickactions" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-lightning me-2 text-warning"></i>
                        <span class="menu-text">Quicks</span>
                    </a>
                </li>
            </ul>
            <ul class="nav flex-column border-top">
                <li class="nav-item">
                    <a routerLink="about" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-info-circle me-2 text-info"></i>
                        <span class="menu-text">About</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white d-flex align-items-center" (click)="closeSidebarOnMobile()"
                        data-bs-toggle="modal" data-bs-target="#helpModal">
                        <i class="bi bi-question-circle me-2 text-success"></i>
                        <span class="menu-text">Help</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="/setting" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-gear-wide text-warning me-2"></i>
                        <span class="menu-text">Settings</span>
                    </a>
                </li>
            </ul>
            <ul class="nav flex-column border-top">
                <li class="nav-item">
                    <a routerLink="printjob" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-printer me-2 text-info"></i>
                        <span class="menu-text">Print-Jobs</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="profile" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-person-circle me-2"></i>
                        <span class="menu-text">Profile</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="admin" class="nav-link text-white d-flex align-items-center"
                        (click)="closeSidebarOnMobile()">
                        <i class="bi bi-shield-lock me-2 text-warning"></i>
                        <span class="menu-text">Admin</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link d-flex align-items-center text-danger" (click)="closeSidebarOnMobile()"
                        data-bs-toggle="modal" data-bs-target="#appLogoutButton">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        <span class="menu-text">Logout</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
    <!-- Main Area -->
    <div class="main-area">
        <main class="content">
            <!-- Mobile Hamburger -->
            <button class="btn btn-outline-dark d-lg-none mb-3" type="button" data-bs-toggle="collapse"
                data-bs-target="#sidebar">
                <i class="bi bi-list"></i>
            </button>
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
<!-- Reusable confirm modal -->
<app-confirm-dialog [id]="'appLogoutButton'" [title]="'Confirm Logout'" [message]="'Are you sure you want to log out?'"
    [confirmText]="'Logout'" [cancelText]="'Cancel'" [confirmBtnClass]="'btn-danger'" (confirmed)="logout()">
</app-confirm-dialog>
<app-help></app-help>
